name: AWS vpc Module Validation

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'modules/**'
      - '.github/workflows/**'

jobs:
  terraform-module-validation:
    name: Terraform Module Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.4"
  
      - name: Terraform Format Check
        id: fmt
        run: |
          cd modules/vpc
          terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Init
        id: init
        run: |
          cd modules/vpc
          terraform init -backend=false
        continue-on-error: false

      - name: Terraform Validate
        id: validate
        run: |
          cd modules/vpc
          terraform validate
        continue-on-error: false

  opa-terraform-module-validation:
    name: OPA Terraform Module Policy Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: OPA Check
        id: opa-check
        run: |
          opa check modules/vpc/policy/main.rego modules/vpc/policy/test.rego
        continue-on-error: false

      - name: OPA Test
        id: opa-test
        run: |
          opa test modules/vpc/policy/ -v
        continue-on-error: true

  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [terraform-module-validation, opa-terraform-module-validation]
    if: always()
    
    steps:
      - name: Check validation results
        run: |
          if [ "${{ needs.terraform-module-validation.result }}" != "success" ] || [ "${{ needs.opa-terraform-module-validation.result }}" != "success" ]; then
            echo "❌ Validation failed"
            exit 1
          else
            echo "✅ All validations passed"
          fi

